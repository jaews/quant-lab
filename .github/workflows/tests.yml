name: Tests

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r research/requirements.txt
          pip install -r research/requirements-dev.txt

      - name: Run unit tests
        working-directory: research
        run: pytest -q

      - name: Validate sample run
        working-directory: research
        run: python -m analysis.validate_run --run results/runs/sample_run
